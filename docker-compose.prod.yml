services:
  web:
    image: fonio-web:latest
    restart: unless-stopped
    # Runtime config (MONGODB_URI, MONGODB_DB, FONIO_API_KEY, ...) from the
    # .env shipped next to this file by the deploy workflow (secrets.DOT_ENV).
    env_file:
      - .env
    environment:
      # Service account key shipped next to this file by the deploy workflow
      # (secrets.GOOGLE_CALENDAR_IAM), mounted below for the calendar integration.
      - GOOGLE_CALENDAR_KEY_FILE=/run/secrets/google-calendar-iam.json
    volumes:
      - ./google-calendar-iam.json:/run/secrets/google-calendar-iam.json:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # ${CLOUDFLARE_TUNNEL_KEY} is interpolated from the same .env file.
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_KEY}
    depends_on:
      - web
